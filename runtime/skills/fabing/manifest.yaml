name: fabing
version: "1.0.0"
author: "Alice"
license: "MIT"
description: "Emotional rant generator — Gen-Z internet copypasta"

actions:
  - name: use_fabing_app
    category: fun
    description:
      - "Generate an over-the-top love confession for someone — internet meme style (发病文学)."
      - "Pass a name to customize the target. The result is a dramatic, exaggerated love letter."
    usageHint: "Meme love letter. Use for playful flirting or group fun."
    whenToUse: "Playful flirting, group fun, or when asked for a love confession meme"
    whenNotToUse: "In serious emotional conversations"
    params:
      - name: name
        type: string
        required: true
        description: "Target name to include in the confession"
    returns: "JSON result in next round."

runtime:
  backend: shell
  timeout: 10
  shell:
    command: "npx tsx bin/fabing.ts {{name}}"
