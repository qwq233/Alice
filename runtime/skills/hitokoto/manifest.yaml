name: hitokoto
version: "1.0.0"
author: "Alice"
license: "MIT"
description: "Random quote — anime, literature, and game quotes"

actions:
  - name: use_hitokoto_app
    category: fun
    description:
      - "Get a random quote — anime, manga, game, or literature. Like opening a fortune cookie."
    usageHint: "Random quote. Share a pretty line, sign-off greeting, or conversation seasoning."
    whenToUse: "Share a quote, sign off with a pretty line, or season a conversation"
    whenNotToUse: "When the conversation needs a direct answer, not decoration"
    params: []
    returns: "JSON result in next round."

runtime:
  backend: shell
  timeout: 10
  shell:
    command: "npx tsx bin/hitokoto.ts"

familyCategory: fun
family:
  label: "趣味互动"
  whenToUse: "轻松互动/文化梗/运势/一言"
  tutorials:
    - "// use_hitokoto_app()  // 随机一言（动漫/文学金句）"
    - "// use_luck_app()  // 今日运势"
    - '// use_fabing_app({ name: "Alice" })  // 发病文学'
    - "// use_kfc_app()  // 疯狂星期四文案"
