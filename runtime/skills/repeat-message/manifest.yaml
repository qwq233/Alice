name: repeat-message
version: "1.0.0"
description: "Repeat — forward a message within the same chat"

actions:
  - name: repeat_message
    category: messaging
    description:
      - "Repeat (echo/parrot) someone's message by forwarding it into the same chat."
      - "A classic group chat interaction: when everyone starts echoing the same message."
    usageHint: "Group fun: echo a funny message. Pass the msgId from chat history."
    whenToUse: "Echo/parrot a message for fun, join a repeat chain, or highlight something funny"
    whenNotToUse: "When quoting with commentary is more appropriate — use send_message with replyTo instead"
    params:
      - name: msgId
        type: number
        required: true
        description: "Message ID to repeat"
      - name: chatId
        type: number
        required: true
        description: "Chat where the message lives"

runtime:
  backend: shell
  timeout: 10
  shell:
    command: "npx tsx bin/repeat-message.ts {{msgId}} {{chatId}}"

capabilities:
  - telegram.forward
