name: selfcheck
version: "1.0.0"
author: "Alice"
license: "MIT"
description: "Self-check — five-dimension self-perception mirror"

# engine.selfcheck: 调用 selfcheck 端点
# graph.write: 将结果存入 self.last_selfcheck_result
capabilities:
  - engine.selfcheck
  - graph.write

actions:
  - name: use_selfcheck_app
    category: app
    description:
      - "Look in the mirror — check your mood, social health, personality, pressure trends, and recent actions."
      - "Like pausing to check in with yourself. All feedback is in plain language, no numbers."
      - "Pass a focus dimension to zoom in, or omit for a compact overview."
    usageHint: "Self check-in. Use during quiet moments to reflect on mood, relationships, or personality."
    whenToUse: "Check in with yourself — mood, relationships, personality, pressure"
    whenNotToUse: "During active conversation (for quiet reflection)"
    params:
      - name: focus
        type: string
        required: false
        description: 'Zoom into one dimension: "mood", "social", "personality", "pressure", "actions" (default: compact overview)'
    returns: "Results available in the next round as observation (`self.last_selfcheck_result`)."

runtime:
  backend: shell
  timeout: 10
  shell:
    command: "npx tsx bin/selfcheck.ts {{focus}}"

family:
  label: "自检"
  whenToUse: "自我感知：情绪、社交健康、人格、压力趋势、行动质量"
  tutorials:
    - '// use_selfcheck_app({})'
    - '// use_selfcheck_app({ focus: "mood" })'
    - "// -> results appear automatically in next round"
