name: luck
version: "1.0.0"
author: "Alice"
license: "MIT"
description: "Daily fortune — horoscope and divination"

actions:
  - name: use_luck_app
    category: fun
    description:
      - "Check today's fortune — like a daily horoscope."
    usageHint: "Daily fortune. Fun morning greeting or when someone asks about luck."
    whenToUse: "Check fortune for the day, morning greetings, or when someone mentions luck"
    whenNotToUse: "When fortune-telling isn't relevant"
    params: []
    returns: "JSON result in next round."

runtime:
  backend: shell
  timeout: 10
  shell:
    command: "npx tsx bin/luck.ts"
