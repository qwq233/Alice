name: countdown
version: "1.0.0"
author: "Alice"
license: "MIT"
description: "Date countdown — days until a target date"

capabilities:
  - config.read

actions:
  - name: use_countdown_app
    category: app
    description:
      - "Calculate days until or since a target date."
      - "Pass a date string (YYYY-MM-DD) to see the countdown."
    usageHint: "Countdown to a future date or days since a past date."
    whenToUse: "Calculate days until or since a target date"
    whenNotToUse: "When the date isn't relevant to the conversation"
    params:
      - name: date
        type: string
        required: true
        description: "Target date in YYYY-MM-DD format"
    returns: "Results available in the next round as observation (`self.last_countdown_result`)."

runtime:
  backend: shell
  timeout: 10
  shell:
    command: "npx tsx bin/countdown.ts {{date}}"

familyCategory: timer
family:
  label: "倒计时"
  whenToUse: "计算距某个日期的天数"
  tutorials:
    - '// use_countdown_app({ date: "2025-12-31" })'
    - "// -> results appear automatically in next round"
