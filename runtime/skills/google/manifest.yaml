name: google
version: "1.0.0"
author: "Alice"
license: "MIT"
description: "Web search — search the web and get a synthesized answer with sources"

capabilities:
  - config.secrets
  - llm.synthesize
  - graph.write

actions:
  - name: google
    category: knowledge
    description:
      - "Google a question — search the web and get a synthesized answer with sources."
      - "Like typing a question into a search engine. Results appear in the next round."
    usageHint: "Web search. Ask a question to look up facts, recent events, or unfamiliar topics."
    whenToUse: "Search the web for facts, recent events, or unfamiliar topics"
    whenNotToUse: "For information you already know or can infer"
    params:
      - name: question
        type: string
        required: true
        description: "The question to search for"
    returns: "Results available in the next round as observation (`self.last_google_result`)."

runtime:
  backend: shell
  timeout: 30
  shell:
    command: "npx tsx bin/google.ts {{question}}"

family:
  label: "搜索"
  whenToUse: "搜索网络获取事实、新闻、不确定的信息"
  tutorials:
    - '// google({ question: "北京今天天气" })'
    - "// -> results appear automatically in next round"
