name: calendar
version: "1.0.0"
author: "Alice"
license: "MIT"
description: "Calendar — lunar calendar, solar terms, holidays, almanac, today in history"

# 申请 config.read 能力：需要读取 timezoneOffset
capabilities:
  - config.read

actions:
  - name: use_calendar_app
    category: app
    description:
      - "Check current date and time, or look up calendar details: lunar date, solar terms, holidays."
      - "Defaults to today. Pass a date string (YYYY-MM-DD) to check a specific date."
    usageHint: "Date, time, lunar dates, solar terms, and holidays."
    whenToUse: "Check current date/time, look up lunar dates, solar terms, or holidays"
    whenNotToUse: "When time/date isn't relevant to the conversation"
    params:
      - name: date
        type: string
        required: false
        description: "Date in YYYY-MM-DD format (defaults to today)"
    returns: "Results available in the next round as observation (`self.last_calendar_result`)."

runtime:
  backend: shell
  timeout: 10
  shell:
    command: "npx tsx bin/calendar.ts {{date}}"

family:
  label: "日历"
  whenToUse: "日期/时间/农历/节气/节假日查询"
  tutorials:
    - '// use_calendar_app({})'
    - '// use_calendar_app({ date: "2025-02-14" })'
    - "// -> results appear automatically in next round"
