name: weather
version: "1.1.0"
author: "Alice"
license: "MIT"
description: "Weather forecast — global coverage, free (Open-Meteo API)"

actions:
  - name: use_weather_app
    category: weather
    description:
      - "Check weather for a city — temperature, condition, wind, humidity."
      - "Like opening a weather app on your phone. Pass the city name."
    usageHint: "Weather forecast. Use when weather comes up in conversation."
    whenToUse: "Check weather for a city"
    whenNotToUse: "When weather isn't relevant to the conversation"
    params:
      - name: city
        type: string
        required: true
        description: 'City name (e.g. "Beijing", "东京")'
    returns: "Results printed to stdout in next round."

runtime:
  backend: shell
  timeout: 15
  shell:
    command: "npx tsx bin/weather.ts {{city}}"

family:
  label: "天气"
  whenToUse: "天气查询"
  tutorials:
    - '// use_weather_app({ city: "北京" })'
    - "// -> results appear automatically in next round"
