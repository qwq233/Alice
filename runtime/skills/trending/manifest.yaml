name: trending
version: "1.0.0"
author: "Alice"
license: "MIT"
description: "Trending — hot topics from Weibo, Zhihu, Bilibili, Douyin"

actions:
  - name: use_trending_app
    category: trending
    description:
      - "Check trending topics on Chinese social media platforms."
      - "Supports: weibo, zhihu, douyin, bilibili, baidu, toutiao, rednote."
    usageHint: "Trending topics. Use to catch up on what's hot."
    whenToUse: "Check trending topics, catch up on hot news, see what people are talking about"
    whenNotToUse: "When trend information isn't relevant"
    params:
      - name: platform
        type: string
        required: false
        description: 'Platform name (weibo/zhihu/douyin/bilibili/baidu/toutiao/rednote). Default: weibo'
    returns: "Results printed to stdout in next round."

runtime:
  backend: shell
  timeout: 15
  shell:
    command: "npx tsx bin/trending.ts {{platform}}"

family:
  label: "热搜"
  whenToUse: "热搜热榜查询"
  tutorials:
    - '// use_trending_app({ platform: "weibo" })'
    - "// -> results appear automatically in next round"
