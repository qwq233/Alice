name: video
version: "1.0.0"
author: "Alice"
license: "MIT"
description: "Video search — Bilibili (default) + YouTube"

actions:
  - name: use_video_app
    category: video
    description:
      - "Search for videos on Bilibili or YouTube."
      - "Returns video title, author, play URL, duration, and view count."
    usageHint: "Video search. Use for sharing interesting videos or when video content comes up."
    whenToUse: "Search for videos, share video content, find a specific video"
    whenNotToUse: "When video content isn't relevant"
    params:
      - name: query
        type: string
        required: true
        description: "Search keywords"
      - name: platform
        type: string
        required: false
        description: 'Platform (bilibili or youtube). Default: bilibili'
    returns: "Results printed to stdout in next round."

runtime:
  backend: shell
  timeout: 15
  env:
    - name: YOUTUBE_API_KEY
      description: "YouTube Data API v3 key (optional, for YouTube search)"
  shell:
    command: "npx tsx bin/video.ts {{query}} {{platform}}"

family:
  label: "视频"
  whenToUse: "视频搜索与分享"
  tutorials:
    - '// use_video_app({ query: "猫咪" })'
    - '// use_video_app({ query: "cats", platform: "youtube" })'
    - "// -> results appear automatically in next round"
