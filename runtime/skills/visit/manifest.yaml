name: visit
version: "1.0.0"
author: "Alice"
license: "MIT"
description: "Visit a URL — read and summarize a web page"

capabilities:
  - config.secrets
  - llm.summarize
  - graph.write

actions:
  - name: visit
    category: knowledge
    description:
      - "Visit a URL — read and summarize a web page."
      - "Like typing an address into your browser. A sub-agent reads and summarizes the page."
      - "Optional `focus` tells the sub-agent what to pay attention to."
      - "Results appear in the next round."
    usageHint: "Read a web page. Pass a URL and optionally a focus to guide the summary."
    whenToUse: "Read a specific URL to get a summary of its content"
    whenNotToUse: "For general web search — use google() instead"
    params:
      - name: url
        type: string
        required: true
        description: "The URL to visit (https://...)"
      - name: focus
        type: string
        required: false
        description: "Tell the reader what to focus on — the summary will center around this"
    returns: "Results available in the next round as observation (`self.last_visit_result`)."

runtime:
  backend: shell
  timeout: 30
  shell:
    command: "npx tsx bin/visit.ts {{url}} {{focus}}"

family:
  label: "阅读"
  whenToUse: "阅读网页并获取摘要"
  tutorials:
    - '// visit({ url: "https://example.com/article" })'
    - '// visit({ url: "https://example.com/paper", focus: "main conclusions" })'
    - "// -> results appear automatically in next round"
